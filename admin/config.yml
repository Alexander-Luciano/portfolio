backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/portfolio/assets/uploads"

collections:
  - name: "portfolio_data"
    label: "Portfolio Settings"
    file: "_data/site.json"
    description: "Manage global settings, hero, about, and skills."
    fields:
      - {label: "Profile Picture", name: "profile_pic", widget: "image", required: false}
      - {label: "Hero Name", name: "hero_name", widget: "string"}
      - {label: "Location", name: "location", widget: "string", required: false}
      - {label: "Availability", name: "availability", widget: "string", required: false}
      - {label: "Hero Title", name: "hero_title", widget: "string"}
      - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
      - {label: "About Text", name: "about_text", widget: "markdown"}
      - label: "Experience"
        name: "experience"
        widget: "list"
        fields:
          - {label: "Date Range", name: "date", widget: "string"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Company", name: "company", widget: "string"}
          - {label: "Description Items", name: "items", widget: "list", field: {label: "Item", name: "item", widget: "string"}}
      - label: "Core Competencies"
        name: "core_competencies"
        widget: "list"
        field: {label: "Skill", name: "skill", widget: "string"}

  - name: "projects"
    label: "Projects"
    folder: "projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tech Stack", name: "tech", widget: "string"}
      - {label: "Description", name: "desc", widget: "text"}
      - {label: "Project Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown", required: false}
